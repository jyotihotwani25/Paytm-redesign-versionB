<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paytm B — Payment Successful</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-hdr{background:var(--nav-surface);padding:13px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
    .page-hdr-back{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .page-hdr-back svg{width:18px;height:18px;stroke:rgba(255,255,255,.8);fill:none;stroke-width:2;stroke-linecap:round;}
    .page-hdr-title{font-size:16px;font-weight:700;color:#fff;flex:1;}
    @keyframes ringIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
    .ring-in{animation:ringIn .35s cubic-bezier(.175,.885,.32,1.275) both;}
  </style>
</head>
<body>
<div class="page" style="background:var(--n-000);">
  <div class="page-hdr">
    <a href="index.html" class="page-hdr-back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="page-hdr-title">Payment Successful</span>
    <button style="width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="1.8" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </button>
  </div>

  <div style="padding:36px 20px 0;text-align:center;">
    <div class="success-ring ring-in">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div style="font-size:14px;color:var(--n-400);font-weight:500;margin-top:14px;">Money sent successfully</div>
    <div id="dispAmt" style="font-size:48px;font-weight:700;color:var(--n-900);letter-spacing:-2px;margin-top:6px;line-height:1;">Rs.3,200</div>
    <div id="dispNote" style="font-size:13px;color:var(--n-400);margin-top:6px;">Money Transfer</div>
  </div>

  <div style="padding:24px 20px 0;">
    <div class="card-surface" style="padding:16px;">
      <!-- Recipient -->
      <div style="display:flex;align-items:center;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--n-100);">
        <div class="av av-44 t1" id="recpAv">AS</div>
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--n-400);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;">To</div>
          <div style="font-size:15px;font-weight:700;color:var(--n-900);" id="recpName">Anjali Sharma</div>
          <div style="font-size:12px;color:var(--n-400);margin-top:2px;" id="recpUpi">anjali.s@okicici</div>
        </div>
        <span class="badge badge-success" style="margin-left:auto;">Verified</span>
      </div>
      <!-- From -->
      <div style="display:flex;align-items:center;gap:12px;padding-top:14px;">
        <div class="av av-44 t8">AK</div>
        <div>
          <div style="font-size:11px;font-weight:700;color:var(--n-400);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;">From</div>
          <div style="font-size:15px;font-weight:700;color:var(--n-900);">Arjun Kapoor</div>
          <div style="font-size:12px;color:var(--n-400);margin-top:2px;">ICICI Bank &middot; arjun.kapoor@okicici</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Transaction details -->
  <div style="padding:16px 20px 0;">
    <div class="card-surface" style="padding:0 16px;">
      <div class="detail-row"><span class="detail-label">Date &amp; Time</span><span class="detail-value" id="txnDate">—</span></div>
      <div class="detail-row">
        <span class="detail-label">UPI Ref No.</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:12px;color:var(--n-500);font-family:monospace;" id="txnRef">—</span>
          <button id="copyBtn" onclick="copyText(document.getElementById('txnRef').textContent, this)" style="font-size:12px;font-weight:700;color:var(--brand);background:none;border:none;cursor:pointer;">Copy</button>
        </div>
      </div>
      <div class="detail-row"><span class="detail-label">Payment method</span><span class="detail-value">ICICI Bank &middot; UPI</span></div>
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span style="font-size:13px;font-weight:700;color:var(--success);display:flex;align-items:center;gap:5px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          Successful
        </span>
      </div>
    </div>
  </div>

  <div style="padding:16px 20px 0;display:grid;grid-template-columns:1fr 1fr;gap:10px;">
    <button class="btn btn-muted btn-full" onclick="window.location='pay.html'">Pay Again</button>
    <button class="btn btn-muted btn-full" onclick="window.location='history.html'">View History</button>
  </div>
  <div style="padding:10px 20px 0;">
    <button class="btn btn-brand btn-full" style="height:52px;font-size:15px;" onclick="window.location='index.html'">Back to Home</button>
  </div>
  <div class="spacer"></div>
</div>
<script src="script.js"></script>
<script>
renderBottomBar('home');
const amt   = sessionStorage.getItem('payAmount') || '3200';
const payee = sessionStorage.getItem('payee')     || 'Anjali Sharma';
const upi   = sessionStorage.getItem('upi')       || 'anjali.s@okicici';
const note  = sessionStorage.getItem('payNote')   || 'Money Transfer';
document.getElementById('dispAmt').textContent  = 'Rs.' + Number(amt).toLocaleString('en-IN');
document.getElementById('dispNote').textContent = note;
document.getElementById('recpName').textContent = payee;
document.getElementById('recpUpi').textContent  = upi;
document.getElementById('recpAv').textContent   = payee.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
const ref = String(Math.floor(Math.random()*900000000000+100000000000));
document.getElementById('txnRef').textContent = 'TXN' + ref;
const now = new Date();
document.getElementById('txnDate').textContent = now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) + ', ' + now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
</script>
</body>
</html>
